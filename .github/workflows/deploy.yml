name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0'
  AZURE_RESOURCE_GROUP: 'gcdev-webapps-rg'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Step 1: Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Step 3: Restore NuGet packages
      - name: Restore NuGet packages
        run: dotnet restore

      # Step 4: Build the application
      - name: Build application
        run: dotnet build --configuration Release --no-restore

      # Step 5: Publish for Azure deployment
      - name: Publish application
        run: dotnet publish -c Release -o '${{ github.workspace }}/publish' --no-build

      # Step 6: Authenticate with Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      # Step 7: Deploy to DEV
      - name: Deploy to DEV
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'f1-api-wrapper-dev'
          slot-name: 'production'
          package: '${{ github.workspace }}/publish'

      # Step 8: Deploy to STAGING
      - name: Deploy to STAGING
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'f1-api-wrapper-staging'
          slot-name: 'production'
          package: '${{ github.workspace }}/publish'

      # Step 9: Wait for manual approval before PROD
      - name: Manual Approval Required
        run: |
          echo "Deployments to Dev and Staging complete."
          echo "Manual approval is required to deploy to Production."
          echo "Check the GitHub Actions workflow run for approval prompt."

      # Step 10: Deploy to PROD (commented - requires manual trigger)
      # Uncomment this after approving in the workflow UI
      # - name: Deploy to PRODUCTION
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: 'deployflow-prod-api'
      #     slot-name: 'production'
      #     package: '${{ github.workspace }}/publish'

      # Step 11: Verification - Check deployed app health
      - name: Verify Deployments
        run: |
          echo "Dev deployment: https://deployflow-dev-api.azurewebsites.net"
          echo "Staging deployment: https://deployflow-staging-api.azurewebsites.net"
